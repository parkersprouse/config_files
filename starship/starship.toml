# Previous command's exit status
[status]
disabled = false
format = '[$status]($style) '
style = 'bright-red'
recognize_signal_code = true
map_symbol = true
symbol = ''
not_executable_symbol = ''
not_found_symbol = ''
sigint_symbol = ''
signal_symbol = ''
success_symbol = ''


# •
[character]
success_symbol = '[»](green)'
error_symbol = '[»](bright-red)' # slightly dimmer red
vimcmd_symbol = '[«](green)'
vimcmd_replace_one_symbol = '[«](purple)'
vimcmd_replace_symbol = '[«](purple)'
vimcmd_visual_symbol = '[«](yellow)'

# Replacing the default symbols for each language with Nerd Font symbols.
# A Nerd Font must be installed and activated in the terminal for these to show.
# This config was written using "SauceCodePro Nerd Font"

[aws]
disabled = true
style = '208'
symbol = " "
format = ' \[[$symbol($profile.)($region)(\($duration\))]($style)\]'

[aws.profile_aliases]
personal = '1'
streetvet = '2'

[aws.region_aliases]
us-east-1 = 'ue1'
us-east-2 = 'ue2'

[azure]
style = 'bright-blue'

[buf]
style = 'bright-blue'
symbol = " "

[bun]
format = ' \[[$symbol($version)]($style)\]'

[c]
symbol = " "
format = ' \[[$symbol($version(-$name))]($style)\]'

[cmake]
style = 'bright-blue'
format = ' \[[$symbol($version)]($style)\]'

[cmd_duration]
format = ' \[[⏱ $duration]($style)\]'

[cobol]
style = 'bright-blue'
format = ' \[[$symbol($version)]($style)\]'

[conda]
