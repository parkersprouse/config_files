symbol = " "
format = ' \[[$symbol$branch]($style)\]'

[git_commit]
style = 'green'

[git_metrics]
added_style = 'green'
deleted_style = '160' # slightly dimmer red

[git_state]
style = 'yellow'

[git_status]
style = '160' # slightly dimmer red
format = '[$modified$conflicted$stashed$deleted$renamed$staged$untracked$ahead_behind]($style)'
ahead = ' 󰧆'
behind = ' 󰦸'
conflicted = ' '
deleted = ' 󱪢'
diverged = ' 󰃻'
modified = ' '
renamed = ' '
staged = ' '
# stashed = ' '
stashed = ''
typechanged = ''
untracked = ' 󰻭'
up_to_date = ''

